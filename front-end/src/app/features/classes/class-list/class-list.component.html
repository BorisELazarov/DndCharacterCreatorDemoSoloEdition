<h1>Classes:</h1>
<div class="left">
    <div class="left">
    <span class="title">Filter:</span>
    <p-inputgroup class="example-form-field">
        <label class="p-label">Name</label>
        <input pInputText type="text" [(ngModel)]="filter.name" (ngModelChange)="search()">
        @if (filter.name) {
          <button icon-button aria-label="Clear" (click)="filter.name=''">
            <i class="pi pi-times">close</i>
          </button>
        }
    </p-inputgroup>
    <p-inputgroup class="example-form-field">
        <label class="p-label">Hit Dice</label>
        <p-select [options]="getHitDices()" [(ngModel)]="filter.hitDice" (onChange)="search()">
        </p-select>
    </p-inputgroup>
    </div>
</div>
<div class="table">
  <a [routerLink]="['/classes/create']">Create class</a>
  <p-table [value]="data"
  [paginator]="true"
  [rows]="10"
  [rowsPerPageOptions]="[5, 10, 20, 30]">
    <ng-template #header>
      <tr>
        <th pSortableColumn="name">Name:</th>
        <th pSortableColumn="hitDice">Hit Dice:</th>
        <th></th>
      </tr>
    </ng-template>

    <ng-template #body let-class>
        <tr>
          <td>{{class.name}}</td>
          <td>{{class.hitDice}}</td>
          <td>
            <button extended [routerLink]="['/classes', class.id]">
            <i class="pi pi-info"></i>
            Details
          </button></td>
        </tr>
    </ng-template>
  </p-table>
</div>
