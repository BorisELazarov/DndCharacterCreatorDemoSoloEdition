<h1>Proficiency details:</h1>
<h2>Name: {{dndClass?.name}}</h2>
<h2>Type: {{dndClass?.hitDice}}</h2>
<h2>Description:</h2>
<p><span class="p-text">{{dndClass?.description}}</span></p>
<a [routerLink]="['/classes/edit',dndClass?.id]">Edit</a><br>
<button>
  <i class="pi pi-delete" (click)="openDialog()"></i>Delete
</button>
<br>
<a [routerLink]="['/classes']">Back</a>
<h1>Proficiencies:</h1>

<div class="table">
<a [routerLink]="['create']">Create proficiency</a>
<p-table [value]="data"
  [paginator]="true"
  [rows]="10"
  [rowsPerPageOptions]="[5, 10, 20, 30]">
    <ng-template #header>
      <tr>
        <th pSortableColumn="name">Name:</th>
        <th pSortableColumn="type">Type:</th>
        <th></th>
      </tr>
    </ng-template>

    <ng-template #body let-proficiency>
        <tr>
          <td>{{proficiency.name}}</td>
          <td>{{getTypeAsString(proficiency.type)}}</td>
          <td>
            <button extended [routerLink]="['/proficiencies', proficiency.id]">
            <i class="pi pi-info"></i>
            Details
          </button></td>
        </tr>
    </ng-template>
</p-table>
</div>
