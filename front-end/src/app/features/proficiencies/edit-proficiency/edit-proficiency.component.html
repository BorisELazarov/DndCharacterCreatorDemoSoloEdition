<div class="center">
    <div>
    <h1>Edit proficiency</h1>
     <form [formGroup]="editForm" (ngSubmit)="submit()">
        <p-inputgroup>
            <label class="p-label">Name:</label>
            <input matInput type="text" formControlName="name">
            <div *ngIf="editForm.controls['name'].errors?.['required']">
                <a class="danger">*Field must no be empty!</a>
                <br>
            </div>
        </p-inputgroup>
        <p-inputgroup class="full-width">
            <label class="p-label">Type:</label>
            <p-select [options] = "getTypes()" formControlName="type"></p-select>
            @if (editForm.controls['type'].errors?.['required']) {
                <a class="danger">*Field must not be empty!</a>
            }
        </p-inputgroup>
        <p-inputgroup class="full-width">
            <label class="p-label">Subtype:</label>
            <p-select [options] = "getSubtypes()" formControlName="subtype"></p-select>
            @if (editForm.controls['subtype'].errors?.['required']) {
                <a class="danger">*Field must not be empty!</a>
            }
        </p-inputgroup>
           <br>
        <button type="submit">Save</button>
     </form>
    </div>
</div>
