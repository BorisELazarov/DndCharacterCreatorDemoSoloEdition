<h1>Deleted proficiencies:</h1>
<div class="left">
    <div class="left">
    <span class="title">Filter:</span>
    <p-iftalabel class="example-form-field">
        <label class="p-label">Name</label>
        <input pInputText type="text" [(ngModel)]="filter.name" (ngModelChange)="search()">
        @if (filter.name) {
          <button aria-label="Clear" (click)="filter.name=''" (click)="search()">
            <i class="pi pi-close"></i>
          </button>
        }
    </p-iftalabel>
    <p-iftalabel class="example-form-field">
        <label class="p-label">Type</label>
        <p-select [(ngModel)]="filter.type" (selectionChange)="search()">
            <option [value]="undefined" aria-selected="filter.type===''">None</option>
            <option value="SKILL">Skill</option>
            <option value="ARMOR">Armor</option>
            <option value="WEAPON">Weapon</option>
            <option value="SAVING_THROW">Saving Throw</option>
            <option value="LANGUAGE">Language</option>
            <option value="TOOL">Tools</option>
        </p-select>
        @if (filter.type) {
          <button aria-label="Clear" (click)="clearType()" (click)="search()">
            <i class="pi pi-close"></i>
          </button>
        }
    </p-iftalabel>
    </div>
</div>
<div class="table">
<p-table [value]="data"
  [paginator]="true"
  [rows]="10"
  [rowsPerPageOptions]="[5, 10, 20, 30]">
    <ng-template #header>
      <tr>
        <th pSortableColumn="name">Name:</th>
        <th pSortableColumn="type">Type:</th>
        <th></th>
      </tr>
    </ng-template>

    <ng-template #body let-proficiency>
        <tr>
          <td>{{proficiency.name}}</td>
          <td>{{proficiency.type}}</td>
          <td>
            <button extended (click)="restore(proficiency.id)">
              <i class="pi pi-restore"></i>
              Restore
            </button>
            <button extended (click)="openDialog(proficiency.id)">
              <i class="pi pi-delete"></i>
              Confirmed delete
            </button>
        </td>
        </tr>
    </ng-template>
</p-table>
</div>
